<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Safari Tab Triage</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .header {
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .counter { font-size: 14px; color: #888; }

        .card-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: calc(100vh - 200px);
            align-items: flex-start;
        }
        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .card.swiped-left  { transform: translateX(-150%) rotate(-10deg); opacity: 0; }
        .card.swiped-right { transform: translateX(150%) rotate(10deg); opacity: 0; }
        .card.swiped-up    { transform: translateY(-150%); opacity: 0; }

        .card-domain {
            font-size: 12px;
            color: #0a84ff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-section { font-size: 11px; color: #666; margin-bottom: 12px; }
        .card-prior {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
            background: #222;
            border-radius: 6px;
            padding: 4px 10px;
            display: inline-block;
        }
        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
        .card-title a { color: #fff; text-decoration: none; }
        .card-title a:hover { text-decoration: underline; }
        .card-summary { font-size: 14px; color: #bbb; line-height: 1.6; margin-bottom: 16px; }
        .card-url { font-size: 12px; color: #555; word-break: break-all; margin-bottom: 20px; }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 0 20px 20px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn .emoji { font-size: 24px; }

        .btn-archive { background: #2d1f00; color: #ffa500; }
        .btn-keep    { background: #002d0a; color: #30d158; }
        .btn-read    { background: #00162d; color: #0a84ff; }
        .btn-delete  { background: #2d0000; color: #ff453a; }

        .tag-input {
            display: flex;
            gap: 8px;
            padding: 8px 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tag-chip {
            padding: 6px 14px;
            border-radius: 20px;
            background: #222;
            color: #aaa;
            font-size: 13px;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tag-chip:hover, .tag-chip.active {
            background: #0a84ff;
            color: #fff;
            border-color: #0a84ff;
        }

        .done { text-align: center; padding: 60px 20px; }
        .done h2 { font-size: 24px; margin-bottom: 16px; }
        .done p { color: #888; margin-bottom: 20px; }
        .done button {
            padding: 12px 24px;
            background: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 8px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗂️ Tab Triage</h1>
        <span class="counter" id="counter"></span>
    </div>

    <div class="stats" id="stats"></div>

    <div class="card-container" id="card-container"></div>

    <div class="tag-input" id="tag-input">
        <span class="tag-chip" data-tag="Shopping">🛍 Shopping</span>
        <span class="tag-chip" data-tag="Research">🔬 Research</span>
        <span class="tag-chip" data-tag="Read Later">📖 Read Later</span>
        <span class="tag-chip" data-tag="Project">🔧 Project</span>
    </div>

    <div class="actions" id="actions">
        <button class="action-btn btn-delete" onclick="decide('delete')">
            <span class="emoji">🗑️</span>Delete
        </button>
        <button class="action-btn btn-archive" onclick="decide('archive')">
            <span class="emoji">📦</span>Archive
        </button>
        <button class="action-btn btn-read" onclick="decide('read')">
            <span class="emoji">📖</span>Read
        </button>
        <button class="action-btn btn-keep" onclick="decide('keep')">
            <span class="emoji">✅</span>Keep
        </button>
    </div>

    <script>
    const ACTION_LABELS = { keep: '✅ Keep', archive: '📦 Archive', read: '📖 Read', delete: '🗑️ Delete' };

    let cards = [];
    let current = 0;
    let decisions = {};
    let selectedTag = "";

    async function loadCards() {
        const resp = await fetch('/api/cards');
        cards = await resp.json();

        // Pre-populate decisions from cached server state
        decisions = {};
        cards.forEach(c => {
            if (c.decision) decisions[c.url] = c.decision;
        });

        // Start at first undecided card
        current = cards.findIndex(c => !decisions[c.url]);
        if (current === -1) current = cards.length;

        renderCard();
    }

    function renderCard() {
        const container = document.getElementById('card-container');
        const counter   = document.getElementById('counter');
        const stats     = document.getElementById('stats');

        const kept     = Object.values(decisions).filter(d => d.action === 'keep').length;
        const archived = Object.values(decisions).filter(d => d.action === 'archive').length;
        const deleted  = Object.values(decisions).filter(d => d.action === 'delete').length;
        const toRead   = Object.values(decisions).filter(d => d.action === 'read').length;
        stats.innerHTML = `✅ ${kept} · 📦 ${archived} · 📖 ${toRead} · 🗑️ ${deleted}`;

        if (current >= cards.length) {
            counter.textContent = 'All done!';
            container.innerHTML = `
                <div class="done">
                    <h2>🎉 All caught up!</h2>
                    <p>${cards.length} links triaged</p>
                    <button onclick="exportResults()">📥 Export Results</button>
                </div>`;
            document.getElementById('actions').style.display = 'none';
            document.getElementById('tag-input').style.display = 'none';
            return;
        }

        const card = cards[current];
        const undecided = cards.filter(c => !decisions[c.url]).length;
        counter.textContent = `${undecided} remaining / ${cards.length} total`;

        let priorHTML = '';
        const prior = decisions[card.url];
        if (prior) {
            priorHTML = `<div class="card-prior">Prior: ${ACTION_LABELS[prior.action] || prior.action}${prior.tag ? ' · ' + prior.tag : ''}</div>`;
        }

        let summaryHTML = '';
        if (card.summary) {
            let summary = card.summary
                .replace(/^[📖📌📦⏭️]\s*\*\*\w+\*\*:\s*/gm, '')
                .replace(/^Tags:\s*.*$/gm, '')
                .trim();
            summaryHTML = `<div class="card-summary">${summary}</div>`;
        }

        container.innerHTML = `
            <div class="card" id="current-card">
                <div class="card-domain">${card.domain}</div>
                <div class="card-section">from: ${card.section}</div>
                ${priorHTML}
                <div class="card-title"><a href="${card.url}" target="_blank">${card.title}</a></div>
                ${summaryHTML}
                <div class="card-url">${card.url}</div>
            </div>`;
    }

    async function decide(action) {
        if (current >= cards.length) return;

        const card = cards[current];
        decisions[card.url] = { action, tag: selectedTag };

        const el = document.getElementById('current-card');
        if (el) {
            const cls = { delete: 'swiped-left', archive: 'swiped-up', keep: 'swiped-right', read: 'swiped-right' }[action] || 'swiped-right';
            el.classList.add(cls);
        }

        await fetch('/api/decide', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: card.url, action, tag: selectedTag })
        });

        setTimeout(() => {
            // Advance to next undecided card
            let next = current + 1;
            while (next < cards.length && decisions[cards[next].url]) next++;
            current = next;
            renderCard();
        }, 300);
    }

    document.querySelectorAll('.tag-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const tag = chip.dataset.tag;
            if (selectedTag === tag) {
                selectedTag = "";
                chip.classList.remove('active');
            } else {
                document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
                selectedTag = tag;
                chip.classList.add('active');
            }
        });
    });

    async function exportResults() {
        const resp = await fetch('/api/export');
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'triage-results.md';
        a.click();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft'  || e.key === 'd') decide('delete');
        if (e.key === 'ArrowRight' || e.key === 'k') decide('keep');
        if (e.key === 'ArrowUp'    || e.key === 'a') decide('archive');
        if (e.key === 'ArrowDown'  || e.key === 'r') decide('read');
    });

    loadCards();
    </script>
</body>
</html>
